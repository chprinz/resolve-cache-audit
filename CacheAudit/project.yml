name: CacheAudit
options:
  bundleIdPrefix: com.christian.cacheaudit
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "5.0"
    ENABLE_APP_SANDBOX: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.christian.cacheaudit

targets:
  CacheAudit:
    type: application
    platform: macOS
    sources:
      - path: CacheAudit
    settings:
      base:
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: CacheAudit/CacheAudit.entitlements
        ENABLE_HARDENED_RUNTIME: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: Generated-Info.plist
      properties:
        CFBundleDisplayName: Cache Audit
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""

  CacheAuditTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CacheAuditTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: CacheAudit

schemes:
  CacheAudit:
    build:
      targets:
        CacheAudit: all
        CacheAuditTests: [test]
    test:
      targets:
        - CacheAuditTests
    run:
      config: Debug
